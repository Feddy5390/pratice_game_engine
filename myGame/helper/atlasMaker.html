<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprite Atlas UV & Dump 合併工具 (精確原始浮點數版)</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #1e1e1e;
        color: #eaeded;
        margin: 20px;
      }
      h2 {
        color: #4fc3f7;
      }
      .container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .input-box {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      label {
        margin-bottom: 8px;
        font-weight: bold;
        color: #b0bec5;
      }
      textarea {
        height: 250px;
        background-color: #2d2d2d;
        color: #a9b7c6;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 10px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        resize: vertical;
      }
      textarea:focus {
        border-color: #4fc3f7;
        outline: none;
      }
      .output-container {
        display: flex;
        flex-direction: column;
      }
      .output-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .btn {
        background-color: #00bcd4;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .btn:hover {
        background-color: #0097a7;
      }
      .status-msg {
        font-size: 14px;
        color: #81c784;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Sprite Atlas UV & Dump 數據整合工具 (精確原始浮點數版)</h2>

    <div class="container">
      <div class="input-box">
        <label for="uvInput">1. 貼入 TexturePacker JSON (UV 座標大圖)</label>
        <textarea id="uvInput" placeholder="請在此貼入完整的 JSON 內容..."></textarea>
      </div>

      <div class="input-box">
        <label for="dumpInput">2. 貼入 AssetStudio 單張 Dump (自動套用原始 textureRect 與 m_Offset)</label>
        <textarea
          id="dumpInput"
          placeholder="請在此貼入從 AssetStudio 複製的單張 Sprite 傾印文字...&#10;貼入後會自動解析並清空此框。"
        ></textarea>
      </div>
    </div>

    <div class="output-container">
      <div class="output-header">
        <label for="outputJson">3. 最終整合輸出結果 (JSON)：</label>
        <div>
          <span id="statusMessage" class="status-msg"></span>
          <button class="btn" onclick="copyToClipboard()">複製輸出內容</button>
        </div>
      </div>
      <textarea
        id="outputJson"
        style="height: 400px"
        readonly
        placeholder="等待輸入資料..."
      ></textarea>
    </div>

    <script>
      let globalFrames = [];
      let frameMap = new Map();
      let meta = {};

      // 監聽 UV JSON 輸入
      document.getElementById('uvInput').addEventListener('input', function (e) {
        try {
          const rawData = JSON.parse(e.target.value);
          const tpFrames = Array.isArray(rawData.frames)
            ? rawData.frames
            : Object.keys(rawData.frames).map((key) => ({ filename: key, ...rawData.frames[key] }));

          globalFrames = [];
          frameMap.clear();

          tpFrames.forEach((tp) => {
            const cleanName = tp.filename.replace(/\.[^/.]+$/, '');
            const newFrame = {
              filename: cleanName,
              frame: {
                x: tp.frame.x,
                y: tp.frame.y,
                w: tp.frame.w,
                h: tp.frame.h,
                pivotX: 'n/a',
                pivotY: 'n/a',
                trimOffsetX: 'n/a',
                trimOffsetY: 'n/a',
              },
            };

            globalFrames.push(newFrame);
            frameMap.set(cleanName, newFrame.frame);
          });

          meta.size = rawData.meta.size;

          showStatus('✅ UV 大圖解析成功，已初始化精靈表。', '#81c784');
          renderOutput();
        } catch (err) {
          showStatus('❌ JSON 格式有誤，請檢查是否貼完整。', '#e57373');
        }
      });

      // 監聽 Dump 文字輸入
      document.getElementById('dumpInput').addEventListener('input', function (e) {
        const text = e.target.value;
        if (!text.trim()) return;

        if (globalFrames.length === 0) {
          alert('請先在左側貼入 TexturePacker 的 UV JSON 檔案！');
          e.target.value = '';
          return;
        }

        // 呼叫修正後的解析功能
        const dumpData = parseAssetStudioText(text);

        if (!dumpData.name) {
          showStatus('⚠️ 無法從 Dump 中解析出 string m_Name，請確認文字內容。', '#ffb74d');
          return;
        }

        if (frameMap.has(dumpData.name)) {
          const targetFrame = frameMap.get(dumpData.name);

          // 🌟 核心修正：直接使用 Dump 中 Rectf textureRect 的原始浮點數覆蓋 frame 的幾何數據
          if (dumpData.texRectX !== undefined && dumpData.texRectW !== undefined) {
            
            // 覆蓋原本整數的 w, h，改用最原始的 Dump 浮點數值
            targetFrame.w = dumpData.texRectW;
            targetFrame.h = dumpData.texRectH;

            // 🌟 修正：pivotX 和 pivotY 改為從 m_Offset 讀取的 x 和 y（若無此欄位則預設 0）
            targetFrame.pivotX = dumpData.offsetX !== undefined ? dumpData.offsetX : 0;
            targetFrame.pivotY = dumpData.offsetY !== undefined ? dumpData.offsetY : 0;
            
            targetFrame.trimOffsetX = dumpData.texRectX;
            targetFrame.trimOffsetY = dumpData.texRectY;

            showStatus(`🔥 成功套用原始 textureRect 與 m_Offset 更新: ${dumpData.name}`, '#4fc3f7');
          } else {
            showStatus('⚠️ 解析成功，但該 Dump 文字中找不到完整的 Rectf textureRect 區塊。', '#ffb74d');
          }

          renderOutput();
          e.target.value = '';
        } else {
          showStatus(`❌ 找不到名為 [${dumpData.name}] 的圖片在目前的 UV 清單中。`, '#e57373');
        }
      });

      /**
       * 精準解析修正版：引入計數器防止越界讀取 uvTransform
       */
      function parseAssetStudioText(textContent) {
        const lines = textContent.split('\n');
        const result = {};

        let currentSection = '';
        let sectionLinesLeft = 0; // 限制進入結構後只讀取接下來固定的行數

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          // 1. 抓取物件名稱
          if (line.startsWith('string m_Name =')) {
            result.name = line.split('"')[1];
            continue;
          }

          // 2. 判斷進入哪種特定的區塊，並嚴格限制讀取行數 (防止沾染後面的欄位)
          if (line.startsWith('Rectf m_Rect')) {
            currentSection = 'm_Rect';
            sectionLinesLeft = 4;
            continue;
          }
          if (line.startsWith('Vector2f m_Pivot')) {
            currentSection = 'm_Pivot';
            sectionLinesLeft = 2;
            continue;
          }
          // 🌟 核心修正：新增抓取 Vector2f m_Offset 區塊
          if (line.startsWith('Vector2f m_Offset')) {
            currentSection = 'm_Offset';
            sectionLinesLeft = 2;
            continue;
          }
          if (line.startsWith('Rectf textureRect')) {
            currentSection = 'textureRect';
            sectionLinesLeft = 4;
            continue;
          }

          // 3. 如果在有效行數配額內，則解析數值
          if (sectionLinesLeft > 0) {
            if (currentSection === 'm_Rect') {
              if (line.startsWith('float x =')) result.rectX = parseFloat(line.split('=')[1]);
              if (line.startsWith('float y =')) result.rectY = parseFloat(line.split('=')[1]);
              if (line.startsWith('float width =')) result.rectW = parseFloat(line.split('=')[1]);
              if (line.startsWith('float height =')) result.rectH = parseFloat(line.split('=')[1]);
            } else if (currentSection === 'm_Pivot') {
              if (line.startsWith('float x =')) result.pivotXRatio = parseFloat(line.split('=')[1]);
              if (line.startsWith('float y =')) result.pivotYRatio = parseFloat(line.split('=')[1]);
            } else if (currentSection === 'm_Offset') {
              // 🌟 核心修正：將 m_Offset 內對應的 float 寫入結果
              if (line.startsWith('float x =')) result.offsetX = parseFloat(line.split('=')[1]);
              if (line.startsWith('float y =')) result.offsetY = parseFloat(line.split('=')[1]);
            } else if (currentSection === 'textureRect') {
              if (line.startsWith('float x =')) result.texRectX = parseFloat(line.split('=')[1]);
              if (line.startsWith('float y =')) result.texRectY = parseFloat(line.split('=')[1]);
              if (line.startsWith('float width =')) result.texRectW = parseFloat(line.split('=')[1]);
              if (line.startsWith('float height =')) result.texRectH = parseFloat(line.split('=')[1]);
            }

            sectionLinesLeft--;
            if (sectionLinesLeft === 0) {
              currentSection = ''; // 讀完指定行數立刻關閉
            }
          }
        }

        console.log(result);
        return result;
      }

      function renderOutput() {
        const outputObj = { frames: globalFrames, meta };
        document.getElementById('outputJson').value = JSON.stringify(outputObj, null, 2);
      }

      function showStatus(msg, color) {
        const el = document.getElementById('statusMessage');
        el.innerText = msg;
        el.style.color = color;
      }

      // 複製到剪貼簿
      function copyToClipboard() {
        const copyText = document.getElementById('outputJson');
        if (!copyText.value) return;

        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);

        const origMsg = document.getElementById('statusMessage').innerText;
        showStatus('📋 已成功複製到剪貼簿！', '#81c784');
        setTimeout(() => {
          document.getElementById('statusMessage').innerText = origMsg;
        }, 2000);
      }
    </script>
  </body>
</html>
